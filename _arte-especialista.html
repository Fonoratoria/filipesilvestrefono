<!doctype html>

      --disable-gpu --hide-scrollbars --force-device-scale-factor=1 \
      --window-size=1080,1350 --virtual-time-budget=6000 \
      --user-data-dir="/c/Users/filip/AppData/Local/Temp/chrome-art" \

  DICAS:

     Só suba pra 2 se trocar por uma foto de alta resolução (4000px+).
   - Versão STORIES (1080x1920): troque window-size=1080,1920 e ajuste no CSS
     .poster{height:1920px} + .bg object-position e a posição do .content.
   - Trocar a foto: altere o src da .bg.

<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1080px; height:1350px; }
  .poster {
    position:relative; width:1080px; height:1350px; overflow:hidden;
    font-family:'Inter', sans-serif; background:#0a1b30;
  }
  .bg {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; object-position:center 8%;
    filter:url(#sharp) contrast(1.05) saturate(1.07) brightness(1.015);
  }
  .scrim {
    position:absolute; inset:0;
    background:linear-gradient(to top,
      rgba(8,24,44,0.97) 0%,
      rgba(8,24,44,0.93) 16%,
      rgba(8,24,44,0.55) 36%,
      rgba(8,24,44,0.08) 52%,
      rgba(8,24,44,0) 62%);
  }
  .logo { position:absolute; top:62px; left:66px; z-index:3; }
  .logo .wm {
    font-family:'Sora', sans-serif; font-weight:800; font-size:48px;
    letter-spacing:-1.5px; line-height:1; color:#141414;
  }
  .logo .wm .s { color:#006EB4; }
  .logo .sub {
    font-family:'Sora', sans-serif; font-weight:600; font-size:18px;
    letter-spacing:7.5px; color:#141414; margin-top:8px; padding-left:3px;
  }
  .content { position:absolute; left:66px; right:66px; bottom:74px; z-index:3; }
  .badge {
    display:inline-flex; align-items:center;
    background:linear-gradient(120deg, #006EB4, #46C8BE);
    color:#fff; font-family:'Sora', sans-serif; font-weight:700;
    font-size:21px; letter-spacing:3px; padding:13px 27px; border-radius:50px;
    box-shadow:0 12px 32px rgba(0,110,180,0.45);
  }
  .h1 {
    font-family:'Sora', sans-serif; font-weight:800; font-size:110px;
    line-height:0.97; letter-spacing:-2.5px; color:#fff; margin-top:28px;
    text-shadow:0 2px 28px rgba(0,0,0,0.30);
  }
  .rule {
    width:128px; height:9px; border-radius:9px;
    background:linear-gradient(90deg, #006EB4, #46C8BE); margin:28px 0 22px;
  }
  .desc {
    font-family:'Inter', sans-serif; font-weight:600; font-size:33px;
    line-height:1.34; color:#eaf2fb; max-width:730px;
  }
  .desc .num { color:#9fd9f5; font-weight:700; white-space:nowrap; }
  .cred {
    font-family:'Sora', sans-serif; font-weight:700; font-size:25px;
    letter-spacing:1.5px; color:#46C8BE; margin-top:32px;
  }
  .mark { position:absolute; right:62px; bottom:66px; width:118px; z-index:3; opacity:0.97; }
</style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute">
    <filter id="sharp">
      <feConvolveMatrix order="3" preserveAlpha="true"
        kernelMatrix="0 -0.32 0 -0.32 2.28 -0.32 0 -0.32 0"/>
    </filter>
  </svg>

  <div class="poster">
    <img class="bg" src="fotos do site/Foto elegante sentado na cadera de blaser.jpg" alt="">
    <div class="scrim"></div>

    <div class="logo">
      <div class="wm">filipe<span class="s">silvestre</span></div>
      <div class="sub">FONOAUDIÓLOGO</div>
    </div>

    <div class="content">
      <span class="badge">NOVA CONQUISTA</span>
      <div class="h1">ESPECIALISTA<br>EM VOZ</div>
      <div class="rule"></div>
      <div class="desc">Reconhecido pelo Conselho Federal de Fonoaudiologia
        <span class="num">· Título nº 11109/26</span></div>
      <div class="cred">CRFa 5-13357 &nbsp;·&nbsp; Anápolis – GO</div>
    </div>

    <img class="mark" src="favicon.png" alt="">
  </div>
</body>
</html>
